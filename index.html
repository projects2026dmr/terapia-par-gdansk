            {"@type": "Question", "name": "Ile trwa terapia par w Gdańsku?", "acceptedAnswer": {"@type": "Answer", "text": "Terapia par w Gdańsku trwa zazwyczaj od 3 do 12 miesięcy, w zależności od zaawansowania problemów. Spotkania odbywają się raz w tygodniu i trwają 60 minut. W kryzysowych sytuacjach możliwe są sesje 90-minutowe lub spotkania dwa razy w tygodniu."}},
            {"@type": "Question", "name": "Czy terapia par jest skuteczna?", "acceptedAnswer": {"@type": "Answer", "text": "Wiele badań sugeruje, że terapia par może być skuteczna dla wielu par. Skuteczność zależy od zaangażowania obojga partnerów i kompetencji terapeuty."}},
            {"@type": "Question", "name": "Jak wygląda pierwsza wizyta u terapeuty par?", "acceptedAnswer": {"@type": "Answer", "text": "Pierwsza wizyta to spotkanie diagnostyczne trwające 60-90 minut. Terapeuta poznaje historię związku, obecne trudności, cele terapeutyczne oraz oczekiwania pary. Omawiane są zasady współpracy, częstotliwość spotkań i metoda pracy."}},
            {"@type": "Question", "name": "Czy oferujesz terapię par online?", "acceptedAnswer": {"@type": "Answer", "text": "Tak, oferuję terapię online dla par z całej Polski. Sesje odbywają się przez bezpieczną platformę wideo (Zoom lub Google Meet). Terapia online jest równie skuteczna jak stacjonarna i sprawdza się szczególnie u par mieszkających w różnych miastach lub mających ograniczony czas."}},
            {"@type": "Question", "name": "Jak przygotować się do terapii małżeńskiej?", "acceptedAnswer": {"@type": "Answer", "text": "Warto przyjść z otwartością i gotowością do rozmowy o trudnych tematach. Przed pierwszym spotkaniem przemyślcie: jakie obszary związku wymagają zmiany, jakie cele chcecie osiągnąć, co jest dla Was najważniejsze w terapii."}},
            {"@type": "Question", "name": "Czy terapię par można odbywać samemu?", "acceptedAnswer": {"@type": "Answer", "text": "Najlepsze efekty przynosi wspólne uczestnictwo obojga partnerów. Czasem jednak jedna osoba rozpoczyna pracę indywidualnie, aby przygotować się do wspólnych sesji lub gdy partner na razie nie chce uczestniczyć. Indywidualna praca nad relacją również przynosi efekty."}},
            {"@type": "Question", "name": "Jakie problemy w związku można rozwiązać w terapii?", "acceptedAnswer": {"@type": "Answer", "text": "W terapii par można pracować nad: problemami komunikacyjnymi, chronicznymi konfliktami, brakiem bliskości i intymności, zdradą i zaufaniem, różnicami w oczekiwaniach, trudnościami seksualnymi, stresem rodzicielskim, nieporozumieniami finansowymi, decyzją o pozostaniu razem lub rozstaniem."}},
            {"@type": "Question", "name": "Czy terapia po zdradzie może uratować związek?", "acceptedAnswer": {"@type": "Answer", "text": "Terapia po zdradzie może pomóc parom zrozumieć przyczyny kryzysu, przeprocesować emocje i odbudować zaufanie. Sukces zależy od gotowości obojga partnerów do pracy nad związkiem i wzięcia odpowiedzialności za swoje działania. Nie każda para decyduje się na kontynuację, ale terapia pomaga podjąć tę decyzję świadomie."}},
            {"@type": "Question", "name": "Jak często odbywają się spotkania terapeutyczne?", "acceptedAnswer": {"@type": "Answer", "text": "Standardowo spotkania odbywają się raz w tygodniu w stałym terminie. W sytuacjach kryzysowych możliwe są sesje dwa razy w tygodniu. W późniejszej fazie terapii, gdy wprowadzone są już nowe wzorce, częstotliwość może być zmniejszona do raz na dwa tygodnie."}},
            {"@type": "Question", "name": "Czy terapia par jest poufna?", "acceptedAnswer": {"@type": "Answer", "text": "Tak, terapeuta jest zobowiązany do zachowania poufności. Informacje uzyskane podczas sesji nie są udostępniane osobom trzecim, z wyjątkiem sytuacji przewidzianych prawem (np. zagrożenie życia). Każdy partner ma prawo do indywidualnej rozmowy z terapeutą w ramach terapii par."}},
            {"@type": "Question", "name": "Ile kosztuje terapia par w Gdańsku?", "acceptedAnswer": {"@type": "Answer", "text": "Koszt terapii ustalany jest indywidualnie podczas bezpłatnej konsultacji."}},
            {"@type": "Question", "name": "Czy terapia online jest równie skuteczna jak stacjonarna?", "acceptedAnswer": {"@type": "Answer", "text": "Wiele badań sugeruje, że terapia online może być równie skuteczna jak tradycyjna. Warunkiem jest zapewnienie poufności, stabilne połączenie i komfortowa przestrzeń podczas sesji."}},
            {"@type": "Question", "name": "Czy na terapię mogą przyjść narzeczeni?", "acceptedAnswer": {"@type": "Answer", "text": "Tak, terapia par jest przeznaczona dla wszystkich par, niezależnie od statusu formalnego związku. Mogą przyjść małżeństwa, narzeczeni, partnerzy w związkach nieformalnych oraz pary w związkach partnerskich. Ważne jest zaangażowanie emocjonalne w związek, nie jego formalny status."}},
            {"@type": "Question", "name": "Co zrobić, gdy partner nie chce chodzić na terapię?", "acceptedAnswer": {"@type": "Answer", "text": "Można zacząć od otwartej rozmowy o tym, dlaczego terapia jest ważna. Często warto zaproponować jednorazową konsultację bez zobowiązań. Innym rozwiązaniem jest rozpoczęcie pracy indywidualnej nad relacją. Zmiana jednej osoby często prowadzi do zmiany dynamiki całego związku i może zachęcić partnera do dołączenia."}},
            {"@type": "Question", "name": "Jakie metody terapii par stosujesz?", "acceptedAnswer": {"@type": "Answer", "text": "Pracuję głównie w nurcie Terapii Skoncentrowanej na Emocjach (EFT - Emotionally Focused Therapy), uznawanej za najskuteczniejszą metodę terapii par. Wykorzystuję również elementy terapii systemowej, Terapii Schematu dla par oraz narzędzia komunikacyjne oparte na Dialogu Imago."}},
            {"@type": "Question", "name": "Czy terapia par pomoże nam podjąć decyzję o rozstaniu?", "acceptedAnswer": {"@type": "Answer", "text": "Tak, celem terapii nie jest siłowe ratowanie związku za wszelką cenę, lecz pomoc w podjęciu świadomej decyzji. Czasem oznacza to wspólne odbudowanie relacji, a czasem wsparcie w godnym, pełnym szacunku rozstaniu. Terapia pomaga rozstać się w sposób, który minimalizuje krzywdę, szczególnie gdy są dzieci."}},
            {"@type": "Question", "name": "Gdzie odbywają się spotkania stacjonarne w Gdańsku?", "acceptedAnswer": {"@type": "Answer", "text": "Spotkania stacjonarne odbywają się w gabinecie w dzielnicy Wrzeszcz, przy ul. Abrahama 20/3 w Gdańsku. Lokalizacja jest dobrze skomunikowana (blisko tramwaje i autobusy) i oferuje dogodny dojazd z całego Trójmiasta. W pobliżu znajdują się miejsca parkingowe."}},
            {"@type": "Question", "name": "Czy oferujesz terapię w języku angielskim?", "acceptedAnswer": {"@type": "Answer", "text": "Tak, oferuję sesje terapii par w języku angielskim. Jest to szczególnie przydatne dla par mieszanych narodowościowo lub mieszkających za granicą, które preferują terapię online w języku angielskim. Proszę o wcześniejszą informację przy umawianiu wizyty."}},
            {"@type": "Question", "name": "Czy można odwołać wizytę?", "acceptedAnswer": {"@type": "Answer", "text": "Tak, wizytę można odwołać lub przełożyć najpóźniej na 24 godziny przed planowanym spotkaniem bez ponoszenia kosztów. Późniejsze odwołania lub nieobecność mogą wiązać się z pobraniem pełnej opłaty za sesję, ponieważ termin ten mógłby zostać wykorzystany przez inną parę."}},
            {"@type": "Question", "name": "Czy terapia par jest refundowana przez NFZ?", "acceptedAnswer": {"@type": "Answer", "text": "Prywatne gabinety terapii par zazwyczaj nie współpracują z NFZ."}},
            {"@type": "Question", "name": "Jak długo trwa jedna sesja terapii par?", "acceptedAnswer": {"@type": "Answer", "text": "Standardowa sesja terapii par trwa 60 minut. W przypadku intensywnej pracy nad kryzysem lub terapii po zdradzie możliwe są sesje rozszerzone 90-minutowe. Pierwsza sesja diagnostyczna trwa zazwyczaj 75-90 minut, aby móc dokładnie poznać sytuację pary."}},
            {"@type": "Question", "name": "Czy terapia par jest odpowiednia dla par LGBTQ+?", "acceptedAnswer": {"@type": "Answer", "text": "Tak, terapia par jest otwarta dla wszystkich par, niezależnie od orientacji seksualnej czy tożsamości płciowej. Każda relacja zasługuje na profesjonalne wsparcie. Mam doświadczenie w pracy z parami jednopłciowymi i zapewniam bezpieczną, wolną od dyskryminacji przestrzeń terapeutyczną."}},
            {"@type": "Question", "name": "Co jeśli emocje podczas sesji będą zbyt silne?", "acceptedAnswer": {"@type": "Answer", "text": "Terapeuta jest przeszkolony do pracy z silnymi emocjami. W terapii EFT bezpieczeństwo emocjonalne jest priorytetem. Czasem silne emocje są potrzebne do przepracowania trudności, ale zawsze w bezpieczny sposób. Sesje prowadzone są w tempie dostosowanym do możliwości pary."}},
            {"@type": "Question", "name": "Czy terapia par może pomóc w poprawie życia seksualnego?", "acceptedAnswer": {"@type": "Answer", "text": "Tak, wielu parom terapia pomaga odbudować bliskość emocjonalną, która jest fundamentem satysfakcjonującego życia seksualnego. Pracuję również nad komunikacją o potrzebach seksualnych. W przypadku specyficznych problemów seksualnych kieruję do współpracujących ze mną seksuologów."}},
            {"@type": "Question", "name": "Jakie są pierwsze efekty terapii par?", "acceptedAnswer": {"@type": "Answer", "text": "Pierwsze efekty to często zmniejszenie napięcia w relacji, większa otwartość w rozmowach, lepsze rozumienie perspektywy partnera i redukcja intensywności kłótni. Trwałe zmiany wymagają czasu (zazwyczaj 3-6 miesięcy), ale pierwsze pozytywne sygnały często pojawiają się już po 3-4 sesjach."}},
            {"@type": "Question", "name": "Czy terapia par jest formą mediacji?", "acceptedAnswer": {"@type": "Answer", "text": "Nie, terapia par nie jest mediacją. Mediacja koncentruje się na konkretnym sporze i jego rozwiązaniu, podczas gdy terapia par skupia się na emocjach, wzorcach relacyjnych i głębokiej zmianie dynamiki związku. Terapeuta nie jest sędziem i nie wydaje werdyktów - wspiera oboje partnerów w zrozumieniu siebie nawzajem."}},
            {"@type": "Question", "name": "Czy mogę porozmawiać z terapeutą przed pierwszą wizytą?", "acceptedAnswer": {"@type": "Answer", "text": "Tak, oferuję bezpłatną 15-minutową konsultację telefoniczną lub przez Zoom. Możesz zadać pytania o metodę pracy, zasady terapii, dostępność terminów lub wyjaśnić wstępnie sytuację. Konsultacja nie zastępuje terapii, ale pomaga podjąć decyzję o rozpoczęciu współpracy."}},
            {"@type": "Question", "name": "Czy terapia par jest tylko dla związków w kryzysie?", "acceptedAnswer": {"@type": "Answer", "text": "Nie, terapia par może służyć również profilaktyce, rozwojowi komunikacji i pogłębianiu bliskości w związku, który nie przeżywa ostrego kryzysu. Coraz więcej par korzysta z terapii jako inwestycji w relację, podobnie jak chodzi się na siłownię dla zdrowia fizycznego."}},
            {"@type": "Question", "name": "Jakie dokumenty lub informacje przygotować przed pierwszą wizytą?", "acceptedAnswer": {"@type": "Answer", "text": "Nie trzeba przygotowywać formalnych dokumentów. Warto jednak przemyśleć: historię związku (jak się poznaliście, kluczowe momenty), obecne trudności i ich historię, wcześniejsze próby rozwiązania problemów, cele jakie chcecie osiągnąć oraz pytania do terapeuty."}},
            {"@type": "Question", "name": "Czy terapia par jest dostępna w weekendy?", "acceptedAnswer": {"@type": "Answer", "text": "Tak, oferuję spotkania w soboty w godzinach 10:00-14:00. Jest to szczególnie przydatne dla par pracujących w tygodniu lub mieszkających poza Gdańskiem. Terminy weekendowe są bardzo popularne, dlatego zalecam rezerwację z wyprzedzeniem 2-3 tygodni."}},
            {"@type": "Question", "name": "Czy terapeuta może przepisać leki?", "acceptedAnswer": {"@type": "Answer", "text": "Psychoterapeuta nie jest uprawniony do przepisywania leków. W sytuacjach wymagających farmakoterapii (np. depresja, lęk, zaburzenia snu) kieruję do współpracujących ze mną psychiatrów. Współpraca terapeuty z psychiatrą zapewnia kompleksową opiekę nad pacjentem."}},
            {"@type": "Question", "name": "Czy terapia par może odbywać się naprzemiennie z terapią indywidualną?", "acceptedAnswer": {"@type": "Answer", "text": "Tak, niekiedy zalecam wsparcie indywidualne obok terapii par, szczególnie gdy jedno z partnerów zmaga się z osobistymi trudnościami (np. traumą, depresją, zaburzeniami osobowości). Ważne jest, aby obie terapie były koordynowane i prowadzone przez terapeutów współpracujących ze sobą lub tego samego terapeutę."}},
            {"@type": "Question", "name": "Jak zapisać się na terapię par w Gdańsku?", "acceptedAnswer": {"@type": "Answer", "text": "Możesz zapisać się przez formularz kontaktowy na stronie, telefonicznie pod numerem +48 123 456 789 lub mailowo na info@terapia-par-gdansk.netlify.app. Odpowiadam w ciągu 24 godzin."}},
            {"@type": "Question", "name": "Czy oferujesz intensywne warsztaty dla par?", "acceptedAnswer": {"@type": "Answer", "text": "Obecnie koncentruję się na pracy indywidualnej z parami w formie terapii."}},
            {"@type": "Question", "name": "Czy terapia par online wymaga specjalnego oprogramowania?", "acceptedAnswer": {"@type": "Answer", "text": "Nie, do sesji online używam popularnych, bezpiecznych platform: Zoom lub Google Meet. Wystarczy komputer, tablet lub smartfon z kamerą, mikrofonem i stabilnym dostępem do internetu. Przed pierwszą sesją prześlę instrukcję techniczną i link do spotkania."}},
            {"@type": "Question", "name": "Czy podczas terapii otrzymamy prace domowe?", "acceptedAnswer": {"@type": "Answer", "text": "Tak, często zalecam proste ćwiczenia, obserwacje lub lektury do wykonania między sesjami. Pomagają one utrwalić nowe wzorce w codziennym życiu i przyspieszają efekty terapii. Prace domowe są dostosowane do możliwości pary i nigdy nie są oceniane - służą rozwojowi, nie kontroli."}},
            {"@type": "Question", "name": "Co sprawia, że terapia par jest skuteczna?", "acceptedAnswer": {"@type": "Answer", "text": "Skuteczność terapii zależy od: zaangażowania obojga partnerów, otwartości na zmianę, regularności spotkań, dobrego kontaktu z terapeutą oraz praktykowania nowych umiejętności między sesjami. Badania pokazują, że najważniejszym czynnikiem sukcesu jest tzw. alians terapeutyczny - poczucie, że terapeuta rozumie i wspiera oboje partnerów."}},
            {"@type": "Question", "name": "Czy mogę napisać do Ciebie maila z pytaniem?", "acceptedAnswer": {"@type": "Answer", "text": "Oczywiście, zapraszam do kontaktu mailowego na adres info@terapia-par-gdansk.netlify.app. Odpowiadam na pytania dotyczące terapii, terminów, metod pracy i formy współpracy. Czas odpowiedzi to zazwyczaj 24 godziny w dni robocze."}},
            {"@type": "Question", "name": "Czy terapia par jest odpowiednia po wielu latach małżeństwa?", "acceptedAnswer": {"@type": "Answer", "text": "Tak, terapia małżeńska może pomóc parom na każdym etapie związku, również po wielu latach małżeństwa. Wieloletnie pożycie często prowadzi do wypalenia związkowego, rutyny i utraty bliskości. Terapia może pomóc odnowić małżeństwo, niezależnie od tego, ile lat jesteście razem."}},
            {"@type": "Question", "name": "Jakie są najczęstsze błędy w komunikacji partnerskiej?", "acceptedAnswer": {"@type": "Answer", "text": "Najczęstsze błędy to: krytykowanie zamiast mówienia o potrzebach, brak aktywnego słuchania, pogardliwy ton i język ciała, defensywność (branie w obronę), wycofywanie się z trudnych rozmów (stonewalling), porównywanie partnera do innych oraz unikanie trudnych tematów. W terapii uczycie się jak komunikować się konstruktywnie."}},
            {"@type": "Question", "name": "Czy terapia par może pomóc przy problemach z rodziną?", "acceptedAnswer": {"@type": "Answer", "text": "Tak, trudności związane z rodziną pochodzenia, teściami, wychowaniem dzieci często wpływają na relację partnerską. W terapii można pracować nad wspólnym stanowiskiem wobec rodziny, ustalaniem granic, radzeniem sobie z presją rodziców oraz podejmowaniem decyzji wychowawczych."}},
            {"@type": "Question", "name": "Czy terapia jest właściwa, jeśli tylko jedno z nas chce zmian?", "acceptedAnswer": {"@type": "Answer", "text": "Zmiana jest możliwa nawet wtedy, gdy początkowo tylko jedna osoba jest gotowa do pracy. Często jedna zmiana prowadzi do zmiany dynamiki całego związku. Partner, który początkowo był sceptyczny, często dołącza do terapii, widząc pozytywne zmiany. Nawet jeśli partner nigdy nie przyjdzie, praca indywidualna nad relacją przynosi efekty."}}
